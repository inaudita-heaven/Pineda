name: Deploy to GitHub Pages

on:
  push:
    branches: [claude/ruta-expo-app-structure-LK8gI]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://esrqbldyrelortlttxva.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzcnFibGR5cmVsb3J0bHR0eHZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDE3NDIsImV4cCI6MjA5MDUxNzc0Mn0.gChIQJaDg0RztOxDXcSX2J5NZOuww7YPI_d1Z8bN08I

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
