<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ruta Expo — Pasaporte digital para la ruta artística de 12 paradas en Córdoba" />
    <title>Ruta Expo · Pasaporte Digital</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Restaura la ruta guardada por 404.html (SPA routing en GitHub Pages)
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
